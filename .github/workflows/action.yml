name: Update NOSeat Files

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Code ko checkout karen
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Recommended latest stable version
          cache: 'npm'

      - name: Install dependencies
        run: npm install
      
      - name: Fetch JS Script 
        run: |
          curl -L -o noseat.js ${{ secrets.NOSEAT_SCRIPT }}
          node noseat.js

      - name: Changes ko commit karen
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/abidprobook/NOSeat.git

      - name: Commit and push changes
        run: |
          git add nos.txt
          git fetch origin main
          git reset --soft origin/main
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fetch nos.txt latest data"
            git push origin main
          fi
